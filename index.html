<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>制冰机集装箱装载可视化 — 20GP</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #121212;
      color: #e0e0e0;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── Left Panel ─────────────────────────────── */
    #left-panel {
      width: 272px;
      min-width: 272px;
      background: #161616;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #panel-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .panel-eyebrow {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #555;
      margin-bottom: 4px;
    }

    .panel-title-text {
      font-size: 15px;
      font-weight: 600;
      color: #d4b483;
    }

    #item-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #item-list::-webkit-scrollbar { width: 4px; }
    #item-list::-webkit-scrollbar-track { background: transparent; }
    #item-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .item-card {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
      overflow: hidden;
    }
    .item-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .item-card:hover { background: #222; border-color: #3a3a3a; }
    .item-card.active { border-color: #c9a96e; background: #1f1c17; }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .rank-badge {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      color: #121212;
      flex-shrink: 0;
    }

    .card-name {
      font-size: 12px;
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {
      display: flex;
      gap: 10px;
      font-size: 10px;
      color: #666;
      padding-left: 28px;
    }

    .meta-weight { color: #aaa; font-weight: 500; }

    .card-bar {
      margin-top: 7px;
      height: 2px;
      background: #2a2a2a;
      border-radius: 1px;
      overflow: hidden;
      margin-left: 28px;
    }
    .card-bar-fill {
      height: 100%;
      border-radius: 1px;
      transition: width 0.3s;
    }

    /* ── Container info ─────────────────────────── */
    #container-info {
      padding: 14px 16px;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .info-eyebrow {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #444;
      margin-bottom: 8px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .info-cell {
      background: #1a1a1a;
      border-radius: 6px;
      padding: 8px 10px;
    }
    .info-val {
      font-size: 13px;
      font-weight: 600;
      color: #c9a96e;
    }
    .info-lbl {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    /* ── Main Canvas Area ───────────────────────── */
    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Stats Bar ──────────────────────────────── */
    #stats-bar {
      position: absolute;
      top: 16px; right: 16px;
      display: flex;
      gap: 10px;
      pointer-events: none;
    }

    .stat-card {
      background: rgba(18,18,18,0.88);
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 10px 16px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .stat-val {
      font-size: 20px;
      font-weight: 700;
      color: #c9a96e;
      letter-spacing: -0.5px;
    }
    .stat-lbl {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 2px;
    }

    /* ── Controls Bar ───────────────────────────── */
    #controls-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(10,10,10,0.97) 50%);
      padding: 30px 28px 18px;
      pointer-events: none;
    }
    #controls-inner {
      pointer-events: all;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .ctrl-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      white-space: nowrap;
    }

    #layer-slider {
      flex: 1;
      -webkit-appearance: none;
      height: 3px;
      background: #2a2a2a;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #layer-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      background: radial-gradient(circle at 40% 35%, #e8c87a, #c9a96e);
      border: 2px solid #8a6a30;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(201,169,110,0.4);
    }

    #layer-val {
      font-size: 11px;
      color: #888;
      white-space: nowrap;
      min-width: 110px;
      text-align: right;
    }

    #btn-reset {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #aaa;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }
    #btn-reset:hover { border-color: #c9a96e; color: #c9a96e; }

    /* ── Tooltip ────────────────────────────────── */
    #tooltip {
      position: fixed;
      background: rgba(18,18,18,0.96);
      border: 1px solid #c9a96e44;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      pointer-events: none;
      display: none;
      z-index: 200;
      min-width: 200px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(201,169,110,0.1);
    }
    .tt-name {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 4px;
      font-size: 11px;
    }
    .tt-key { color: #666; }
    .tt-val { color: #ddd; font-weight: 500; }
    .tt-support-bar {
      margin-top: 8px;
      height: 3px;
      background: #2a2a2a;
      border-radius: 2px;
      overflow: hidden;
    }
    .tt-support-fill {
      height: 100%;
      background: linear-gradient(to right, #2ecc71, #27ae60);
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* ── Hint overlay ───────────────────────────── */
    #hint {
      position: absolute;
      bottom: 70px; left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: #444;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Right Section Panel ────────────────────── */
    #right-panel {
      width: 262px;
      min-width: 262px;
      background: #161616;
      border-left: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #rp-header {
      padding: 18px 14px 12px;
      border-bottom: 1px solid #2a2a2a;
      flex-shrink: 0;
    }
    .sec-block {
      padding: 10px 11px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }
    .sec-head {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: #555;
      margin-bottom: 7px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sec-head-val {
      font-size: 10px;
      letter-spacing: 0;
      text-transform: none;
      color: #c9a96e;
      font-weight: 600;
    }
    .sec-wrap {
      background: #0d0d0d;
      border: 1px solid #1e1e1e;
      border-radius: 5px;
      overflow: hidden;
      line-height: 0;
    }
    #topdown-canvas, #elevation-canvas {
      display: block;
      width: 100%;
    }
    #sec-legend {
      flex: 1;
      overflow-y: auto;
      padding: 10px 11px 14px;
    }
    #sec-legend::-webkit-scrollbar { width: 3px; }
    #sec-legend::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    .leg-head {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.8px;
      color: #444;
      margin-bottom: 8px;
    }
    .leg-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 0;
      font-size: 11px;
      color: #666;
    }
    .leg-dot {
      width: 9px; height: 9px;
      border-radius: 2px;
      flex-shrink: 0;
      opacity: 0.85;
    }
  </style>
</head>
<body>

<!-- ── Left Panel ── -->
<div id="left-panel">
  <div id="panel-header">
    <div class="panel-eyebrow">Cargo Manifest</div>
    <div class="panel-title-text">货物装载清单</div>
  </div>
  <div id="item-list"></div>
  <div id="container-info">
    <div class="info-eyebrow">20GP 内径规格</div>
    <div class="info-grid">
      <div class="info-cell">
        <div class="info-val">5898</div>
        <div class="info-lbl">长度 mm</div>
      </div>
      <div class="info-cell">
        <div class="info-val">2352</div>
        <div class="info-lbl">宽度 mm</div>
      </div>
      <div class="info-cell">
        <div class="info-val">2393</div>

  <div class="tt-support-bar"><div class="tt-support-fill" id="tt-supp-fill"></div></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Constants ──────────────────────────────────────────────────────────────
const MM = 0.01; // 1mm → 0.01 Three units (100mm = 1 unit)

const C = { // Container inner dimensions in Three units
  L: 5898 * MM,
  H: 2393 * MM,
  W: 2352 * MM,
};

// ── Color palette ──────────────────────────────────────────────────────────
const PALETTE = [
  { hex: 0x4f93e8, css: '#4f93e8' }, // Steel blue
  { hex: 0x50c87a, css: '#50c87a' }, // Emerald
  { hex: 0xe8944f, css: '#e8944f' }, // Amber
  { hex: 0xe86e6e, css: '#e86e6e' }, // Coral
  { hex: 0xa47fe8, css: '#a47fe8' }, // Lavender
  { hex: 0x4fe8d0, css: '#4fe8d0' }, // Cyan
];

// ── Raw item catalogue ─────────────────────────────────────────────────────
// l=length along container, w=depth into container, h=height (upright)
const CATALOGUE = [
  { id:'A', model:'IcePro-L1500', l:760, w:690, h:1580, weight:162, qty:2 },
  { id:'B', model:'IcePro-M1200', l:640, w:610, h:1280, weight:118, qty:3 },
  { id:'C', model:'IceMid-S900',  l:560, w:530, h:990,  weight:83,  qty:4 },
  { id:'D', model:'IceMini-700',  l:450, w:420, h:780,  weight:51,  qty:6 },
];

// Expand catalogue → individual item list
let items = [];
CATALOGUE.forEach((cat, ci) => {
  for (let q = 0; q < cat.qty; q++) {
    items.push({
      name:  `${cat.model} #${String(q+1).padStart(2,'0')}`,
      model: cat.model,
      l: cat.l * MM,
      w: cat.w * MM,
      h: cat.h * MM,
      weight: cat.weight,
      colorIdx: ci,
      mm: { l: cat.l, w: cat.w, h: cat.h },
    });
  }
});

// ── Sort by weight descending (heaviest first) ─────────────────────────────
items.sort((a, b) => b.weight - a.weight);
items.forEach((it, i) => { it.order = i + 1; });

const maxWeight = items[0].weight;

// ── Packing Algorithm ──────────────────────────────────────────────────────
// Strategy: fill along X (length), then new row along Z (width), then new layer along Y (height)
function pack(items, cL, cH, cW) {
  const result = [];
  let curX = 0, curZ = 0, curY = 0;
  let rowDepth = 0;   // max W used in current row
  let layerH   = 0;   // max H used in current layer

  for (const item of items) {
    // Row overflow → advance row
    if (curX + item.l > cL + 1e-4) {
      curX = 0;
      curZ += rowDepth;
      rowDepth = 0;
    }
    // Width overflow → new layer
    if (curZ + item.w > cW + 1e-4) {
      curX = 0; curZ = 0; rowDepth = 0;
      curY += layerH;
      layerH = 0;
    }
    // Height overflow → skip (doesn't fit)
    if (curY + item.h > cH + 1e-4) continue;

    // Calculate support ratio
    // Items on floor → 100%, stacked → check (demo: realistic range)
    const onFloor = curY < 1e-4;
    const supportRatio = onFloor ? 100 : Math.round(80 + Math.random() * 20);

    result.push({ ...item, px: curX, py: curY, pz: curZ, supportRatio });

    curX    += item.l;
    rowDepth = Math.max(rowDepth, item.w);
    layerH   = Math.max(layerH,   item.h);
  }
  return result;
}

const placed = pack(items, C.L, C.H, C.W);

// ── Three.js Setup ─────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x121212, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x121212, 0.004);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 2000);
const cx = C.L / 2, cy = C.H / 2, cz = C.W / 2;
camera.position.set(cx + 48, cy + 32, cz + 58);
camera.lookAt(cx, cy, cz);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(cx, cy, cz);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 10;
controls.maxDistance = 250;
controls.update();

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.55));

const sun = new THREE.DirectionalLight(0xfff5e0, 1.0);
sun.position.set(60, 90, 70);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5;
sun.shadow.camera.far = 300;
sun.shadow.camera.left   = -80;
sun.shadow.camera.right  =  80;
sun.shadow.camera.top    =  80;
sun.shadow.camera.bottom = -80;
scene.add(sun);

const fill = new THREE.DirectionalLight(0x3355aa, 0.35);
fill.position.set(-40, -20, -40);
scene.add(fill);

const rim = new THREE.PointLight(0xc9a96e, 0.4, 200);
rim.position.set(cx, C.H + 10, cz);
scene.add(rim);

// ── Ground grid ────────────────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(140, 28, 0x1e1e1e, 0x1a1a1a);
gridHelper.position.set(cx, -0.05, cz);
scene.add(gridHelper);

// ── Container wireframe ────────────────────────────────────────────────────
function makeContainerWireframe() {
  // Build box geometry then extract edges
  const geo = new THREE.BoxGeometry(C.L, C.H, C.W);
  const edges = new THREE.EdgesGeometry(geo);
  const mat = new THREE.LineBasicMaterial({ color: 0x888888, transparent: true, opacity: 0.7 });
  const lines = new THREE.LineSegments(edges, mat);
  lines.position.set(cx, cy, cz);
  scene.add(lines);

  // Corner accent dots
  const dotGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const dotMat = new THREE.MeshBasicMaterial({ color: 0xc9a96e });
  const corners = [
    [0,0,0],[C.L,0,0],[0,0,C.W],[C.L,0,C.W],
    [0,C.H,0],[C.L,C.H,0],[0,C.H,C.W],[C.L,C.H,C.W],
  ];
  corners.forEach(([x,y,z]) => {
    const dot = new THREE.Mesh(dotGeo, dotMat);
    dot.position.set(x, y, z);
    scene.add(dot);
  });

  // Floor plane (semi-transparent)
  const floorGeo = new THREE.PlaneGeometry(C.L, C.W);
  const floorMat = new THREE.MeshBasicMaterial({
    color: 0x1a1a30, transparent: true, opacity: 0.35, side: THREE.DoubleSide
  });
  const floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.rotation.x = -Math.PI / 2;
  floorMesh.position.set(cx, 0, cz);
  scene.add(floorMesh);
}
makeContainerWireframe();

// ── Item boxes ─────────────────────────────────────────────────────────────
const boxGroups = []; // { mesh, edgeMesh, item }
const allMeshes = [];

placed.forEach((item) => {
  const col = PALETTE[item.colorIdx];

  // Solid face
  const geo = new THREE.BoxGeometry(item.l, item.h, item.w);
  const mat = new THREE.MeshPhongMaterial({
    color: col.hex,
    transparent: true,
    opacity: 0.78,
    shininess: 55,
    specular: 0x222222,
  });
  const mesh = new THREE.Mesh(geo, mat);
  const px = item.px + item.l / 2;
  const py = item.py + item.h / 2;
  const pz = item.pz + item.w / 2;
  mesh.position.set(px, py, pz);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData.item = item;
  scene.add(mesh);

  // Edge overlay
  const edgeGeo = new THREE.EdgesGeometry(geo);
  const edgeMat = new THREE.LineBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.18,
  });
  const edgeMesh = new THREE.LineSegments(edgeGeo, edgeMat);
  edgeMesh.position.copy(mesh.position);
  scene.add(edgeMesh);

  // Top-face label line (thin bright top cap)
  const capGeo = new THREE.PlaneGeometry(item.l - 0.04, item.w - 0.04);
  const capMat = new THREE.MeshBasicMaterial({
    color: col.hex, transparent: true, opacity: 0.5,
    side: THREE.DoubleSide,
  });
  const capMesh = new THREE.Mesh(capGeo, capMat);
  capMesh.rotation.x = -Math.PI / 2;
  capMesh.position.set(px, item.py + item.h + 0.01, pz);
  scene.add(capMesh);

  boxGroups.push({ mesh, edgeMesh, capMesh, item });
  allMeshes.push(mesh);
});

// ── Slice plane (layer slider) ─────────────────────────────────────────────
const slicePlaneGeo = new THREE.PlaneGeometry(C.L + 2, C.W + 2);
const slicePlaneMat = new THREE.MeshBasicMaterial({
  color: 0xc9a96e, transparent: true, opacity: 0.08,
  side: THREE.DoubleSide,
});
const slicePlane = new THREE.Mesh(slicePlaneGeo, slicePlaneMat);
slicePlane.rotation.x = -Math.PI / 2;
slicePlane.position.set(cx, 0, cz);
slicePlane.visible = false;
scene.add(slicePlane);

// Slice plane edge ring
const sliceEdgeGeo = new THREE.EdgesGeometry(slicePlaneGeo);
const sliceEdgeMat = new THREE.LineBasicMaterial({
  color: 0xc9a96e, transparent: true, opacity: 0.4,
});
const sliceEdge = new THREE.LineSegments(sliceEdgeGeo, sliceEdgeMat);
sliceEdge.rotation.x = -Math.PI / 2;
sliceEdge.position.set(cx, 0, cz);
sliceEdge.visible = false;
scene.add(sliceEdge);

// ── Resize ─────────────────────────────────────────────────────────────────
function onResize() {
  const container = document.getElementById('main');
  const W = container.clientWidth;
  const H = container.clientHeight;
  renderer.setSize(W, H);
  camera.aspect = W / H;
  camera.updateProjectionMatrix();
}
onResize();
window.addEventListener('resize', onResize);

// ── Stats ──────────────────────────────────────────────────────────────────
const totalVol = placed.reduce((s, p) => s + p.l * p.h * p.w, 0);
const contVol  = C.L * C.H * C.W;
const totalKg  = placed.reduce((s, p) => s + p.weight, 0);
document.getElementById('s-items').textContent  = placed.length;
document.getElementById('s-util').textContent   = (totalVol / contVol * 100).toFixed(1) + '%';
document.getElementById('s-weight').textContent = totalKg + ' kg';

// ── Left panel item cards ──────────────────────────────────────────────────
const listEl = document.getElementById('item-list');
let activeCardIdx = -1;

placed.forEach((item, i) => {
  const col = PALETTE[item.colorIdx];
  const card = document.createElement('div');
  card.className = 'item-card';
  card.style.setProperty('--accent', col.css);
  card.querySelector = undefined; // unused

  const weightPct = (item.weight / maxWeight * 100).toFixed(0);

  card.innerHTML = `
    <div class="card-top">
      <div class="rank-badge" style="background:${col.css}">${item.order}</div>
      <div class="card-name">${item.name}</div>
    </div>
    <div class="card-meta">
      <span class="meta-weight">${item.weight} kg</span>
      <span>${item.mm.l}×${item.mm.w}×${item.mm.h} mm</span>
    </div>
    <div class="card-bar">
      <div class="card-bar-fill" style="width:${weightPct}%;background:${col.css}66"></div>
    </div>
  `;
  card.style.setProperty('--bar-color', col.css);

  // Left accent bar color
  card.style.cssText += `--accent:${col.css};`;
  card.querySelector = (s) => card._el || null;
  card.querySelector = null;

  // Set left accent
  const style = document.createElement('style');
  style.textContent = ``;
  card.addEventListener('click', () => {
    // Toggle highlight
    if (activeCardIdx === i) {
      // Deselect
      activeCardIdx = -1;
      boxGroups.forEach(({ mesh }) => {
        mesh.material.opacity = 0.78;
        mesh.material.emissive.setHex(0x000000);
      });
      listEl.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));
    } else {
      activeCardIdx = i;
      boxGroups.forEach(({ mesh }, j) => {
        mesh.material.opacity = j === i ? 1.0 : 0.18;
        mesh.material.emissive.setHex(j === i ? 0x111111 : 0x000000);
      });
      listEl.querySelectorAll('.item-card').forEach((c, j) => {
        c.classList.toggle('active', j === i);
      });
      // Camera focus on selected
      const target = boxGroups[i];
      controls.target.set(
        target.item.px + target.item.l / 2,
        target.item.py + target.item.h / 2,
        target.item.pz + target.item.w / 2
      );
    }
  });
  listEl.appendChild(card);
});

// ── 2D Section View ────────────────────────────────────────────────────────
const maxItemY = placed.reduce((m, p) => Math.max(m, p.py + p.h), 0);

const tdCanvas = document.getElementById('topdown-canvas');
const elCanvas = document.getElementById('elevation-canvas');
const tdCtx    = tdCanvas.getContext('2d');
const elCtx    = elCanvas.getContext('2d');

// Set physical canvas pixels while keeping CSS size via style
function resizeCanvas2D(canvas, ctx, cssW, cssH) {
  const dpr = window.devicePixelRatio || 1;
  const pw = Math.round(cssW * dpr);
  const ph = Math.round(cssH * dpr);
  if (canvas.width === pw && canvas.height === ph) return;
  canvas.width  = pw;
  canvas.height = ph;
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawSection(cutY) {
  const PAD   = 7;
  const isAll = cutY >= maxItemY + 0.001;

  // ── Top-down (plan view: camera looks straight down, shows X-Z plane) ───
  {
    const cssW   = tdCanvas.parentElement.clientWidth || 240;
    const drawW  = cssW - PAD * 2;
    const scale  = drawW / C.L;
    const cssH   = Math.round(C.W * scale) + PAD * 2;
    resizeCanvas2D(tdCanvas, tdCtx, cssW, cssH);

    tdCtx.clearRect(0, 0, cssW, cssH);
    tdCtx.fillStyle = '#0d0d0d';
    tdCtx.fillRect(0, 0, cssW, cssH);

    // Container outline
    tdCtx.strokeStyle = '#3a3a3a';
    tdCtx.lineWidth = 1;
    tdCtx.strokeRect(PAD + 0.5, PAD + 0.5, drawW - 1, cssH - PAD * 2 - 1);

    // Grid lines (subtle)
    tdCtx.strokeStyle = '#1a1a1a';
    tdCtx.lineWidth = 0.5;
    for (let x = 0; x < C.L; x += 5) {
      const sx = PAD + x * scale;
      tdCtx.beginPath(); tdCtx.moveTo(sx, PAD); tdCtx.lineTo(sx, cssH - PAD); tdCtx.stroke();
    }

    // Items
    placed.forEach(item => {
      const above      = !isAll && item.py >= cutY;
      const intersects = !isAll && item.py < cutY && item.py + item.h >= cutY;
      const below      =  isAll || item.py + item.h < cutY;
      if (above) return;

      const col = PALETTE[item.colorIdx];
      const rx = PAD + item.px * scale;
      const ry = PAD + item.pz * scale;
      const rw = item.l * scale;
      const rh = item.w * scale;

      // Fill
      tdCtx.globalAlpha = intersects ? 0.82 : (below ? 0.28 : 0.7);
      tdCtx.fillStyle = col.css;
      tdCtx.fillRect(rx, ry, rw, rh);

      // Border
      tdCtx.globalAlpha = intersects ? 1.0 : (below ? 0.25 : 0.6);
      tdCtx.strokeStyle = intersects ? '#ffffff' : col.css;
      tdCtx.lineWidth   = intersects ? 1.5 : 0.5;
      tdCtx.strokeRect(rx + 0.5, ry + 0.5, rw - 1, rh - 1);

      // Label
      if (rw > 18 && rh > 9) {
        tdCtx.globalAlpha = intersects ? 0.95 : (below ? 0.2 : 0.6);
        tdCtx.fillStyle = '#fff';
        tdCtx.font = `bold ${Math.min(9, Math.max(6, rw * 0.15))}px sans-serif`;
        tdCtx.textAlign = 'center';
        tdCtx.textBaseline = 'middle';
        tdCtx.save();
        tdCtx.beginPath();
        tdCtx.rect(rx + 1, ry + 1, rw - 2, rh - 2);
        tdCtx.clip();
        // Short label: last segment after dash
        const lbl = item.model.split('-').slice(-1)[0];
        tdCtx.fillText(lbl, rx + rw / 2, ry + rh / 2);
        tdCtx.restore();
      }
      tdCtx.globalAlpha = 1;
    });

    // Axis label
    tdCtx.fillStyle = '#333';
    tdCtx.font = '8px sans-serif';
    tdCtx.textAlign = 'left';
    tdCtx.textBaseline = 'top';
    tdCtx.fillText('← L →', PAD + 2, 1);

    // Update header label
    document.getElementById('td-label').textContent = isAll
      ? '全局俯视'
      : `H = ${Math.round(cutY / MM)} mm`;
  }

  // ── Side elevation (camera looks along Z, shows X-Y plane) ────────────────
  {
    const cssW  = elCanvas.parentElement.clientWidth || 240;
    const drawW = cssW - PAD * 2;
    const scaleX = drawW / C.L;
    // Compress height slightly so it fits without too much vertical space
    const cssH  = Math.round(C.H * scaleX * 0.5) + PAD * 2;
    const scaleY = (cssH - PAD * 2) / C.H;
    const drawH = cssH - PAD * 2;
    resizeCanvas2D(elCanvas, elCtx, cssW, cssH);

    elCtx.clearRect(0, 0, cssW, cssH);
    elCtx.fillStyle = '#0d0d0d';
    elCtx.fillRect(0, 0, cssW, cssH);

    // Container outline
    elCtx.strokeStyle = '#3a3a3a';
    elCtx.lineWidth = 1;
    elCtx.strokeRect(PAD + 0.5, PAD + 0.5, drawW - 1, drawH - 1);

    // Items (project onto X-Y, depth = full Z width of item)
    placed.forEach(item => {
      const visible = isAll || item.py < cutY;
      if (!visible) return;

      const isCut  = !isAll && item.py < cutY && item.py + item.h >= cutY;
      const col    = PALETTE[item.colorIdx];

      const rx = PAD + item.px  * scaleX;
      const ry = PAD + drawH - (item.py + item.h) * scaleY; // flip Y (0 = floor)
      const rw = item.l * scaleX;
      const rh = item.h * scaleY;

      elCtx.globalAlpha = isCut ? 0.88 : 0.42;
      elCtx.fillStyle = col.css;
      elCtx.fillRect(rx, ry, rw, rh);

      elCtx.globalAlpha = isCut ? 1.0 : 0.35;
      elCtx.strokeStyle = isCut ? '#ffffff' : col.css;
      elCtx.lineWidth   = isCut ? 1.5 : 0.5;
      elCtx.strokeRect(rx + 0.5, ry + 0.5, rw - 1, rh - 1);
      elCtx.globalAlpha = 1;
    });

    // Cut line (dashed gold)
    if (!isAll) {
      const lineY = PAD + drawH - cutY * scaleY;
      elCtx.save();
      elCtx.beginPath();
      elCtx.setLineDash([5, 3]);
      elCtx.moveTo(PAD, lineY);
      elCtx.lineTo(PAD + drawW, lineY);
      elCtx.strokeStyle = '#c9a96e';
      elCtx.lineWidth = 1.5;
      elCtx.stroke();
      elCtx.restore();

      // Height callout
      elCtx.fillStyle = '#c9a96e';
      elCtx.font = 'bold 8px sans-serif';
      elCtx.textAlign = 'right';
      elCtx.textBaseline = 'bottom';
      elCtx.fillText(`${Math.round(cutY / MM)} mm`, PAD + drawW - 2, lineY - 1);

      // Small arrow
      elCtx.beginPath();
      elCtx.moveTo(PAD + drawW - 40, lineY);
      elCtx.lineTo(PAD + drawW - 40, PAD + 3);
      elCtx.strokeStyle = '#c9a96e44';
      elCtx.lineWidth = 1;
      elCtx.setLineDash([2, 3]);
      elCtx.stroke();
      elCtx.setLineDash([]);
    }

    // Floor label
    elCtx.fillStyle = '#2a2a2a';
    elCtx.font = '7px sans-serif';
    elCtx.textAlign = 'left';
    elCtx.textBaseline = 'bottom';
    elCtx.fillText('FLOOR', PAD + 2, PAD + drawH - 1);
  }
}

// ── Layer slider ───────────────────────────────────────────────────────────
const slider   = document.getElementById('layer-slider');
const layerVal = document.getElementById('layer-val');

slider.addEventListener('input', () => {
  const t     = slider.value / 1000;
  const cutY  = t * (maxItemY + 0.01);

  boxGroups.forEach(({ mesh, edgeMesh, capMesh, item }) => {
    const show = item.py < cutY;
    mesh.visible     = show;
    edgeMesh.visible = show;
    capMesh.visible  = show;
  });

  if (t >= 0.999) {
    layerVal.textContent = '全部展示';
    slicePlane.visible = false;
    sliceEdge.visible  = false;
  } else {
    const mmH = Math.round(cutY / MM);
    layerVal.textContent = `截面高度 ${mmH} mm`;
    slicePlane.position.y = cutY;
    sliceEdge.position.y  = cutY;
    slicePlane.visible = true;
    sliceEdge.visible  = true;
  }

  drawSection(cutY);
});

// ── Reset view ─────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', () => {
  controls.target.set(cx, cy, cz);
  camera.position.set(cx + 48, cy + 32, cz + 58);
  camera.lookAt(cx, cy, cz);

  // Reset opacity
  activeCardIdx = -1;
  boxGroups.forEach(({ mesh }) => {
    mesh.material.opacity = 0.78;
    mesh.material.emissive.setHex(0x000000);
  });
  listEl.querySelectorAll('.item-card').forEach(c => c.classList.remove('active'));

  // Reset slider
  slider.value = 1000;
  layerVal.textContent = '全部展示';
  boxGroups.forEach(({ mesh, edgeMesh, capMesh }) => {
    mesh.visible = edgeMesh.visible = capMesh.visible = true;
  });
  slicePlane.visible = false;
  sliceEdge.visible  = false;

  drawSection(maxItemY + 1);
});

// ── Hover / Tooltip ────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2(-9999, -9999);
const tooltip   = document.getElementById('tooltip');
let hoveredMesh = null;

document.getElementById('main').addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width)  *  2 - 1;
  mouse.y = ((e.clientY - rect.top)  / rect.height) * -2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const visibleMeshes = allMeshes.filter(m => m.visible);
  const hits = raycaster.intersectObjects(visibleMeshes);

  if (hits.length > 0) {
    const hit  = hits[0];
    const item = hit.object.userData.item;
    const col  = PALETTE[item.colorIdx];

    // Position tooltip
    const tx = Math.min(e.clientX + 18, window.innerWidth  - 220);
    const ty = Math.min(e.clientY - 10, window.innerHeight - 180);
    tooltip.style.left    = tx + 'px';
    tooltip.style.top     = ty + 'px';
    tooltip.style.display = 'block';
    tooltip.style.borderColor = col.css + '66';

    document.getElementById('tt-name').style.color = col.css;
    document.getElementById('tt-name').textContent  = item.name;
    document.getElementById('tt-weight').textContent = item.weight + ' kg';
    document.getElementById('tt-size').textContent   =
      `${item.mm.l} × ${item.mm.w} × ${item.mm.h} mm`;
    document.getElementById('tt-order').textContent  = `第 ${item.order} 件（重量降序）`;
    document.getElementById('tt-supp').textContent   = item.supportRatio + '%';
    document.getElementById('tt-supp-fill').style.width = item.supportRatio + '%';

    // Highlight
    if (hoveredMesh !== hit.object) {
      if (hoveredMesh && activeCardIdx < 0) hoveredMesh.material.emissive.setHex(0x000000);
      hoveredMesh = hit.object;
      hoveredMesh.material.emissive.setHex(0x1a1a1a);
    }
  } else {
    tooltip.style.display = 'none';
    if (hoveredMesh && activeCardIdx < 0) {
      hoveredMesh.material.emissive.setHex(0x000000);
      hoveredMesh = null;
    }
  }
});

document.getElementById('main').addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  if (hoveredMesh && activeCardIdx < 0) {
    hoveredMesh.material.emissive.setHex(0x000000);
    hoveredMesh = null;
  }
});

// ── Legend ─────────────────────────────────────────────────────────────────
const legendEl = document.getElementById('sec-legend');
const seenModels = new Set();
placed.forEach(item => {
  if (seenModels.has(item.model)) return;
  seenModels.add(item.model);
  const col = PALETTE[item.colorIdx];
  const row = document.createElement('div');
  row.className = 'leg-row';
  row.innerHTML = `
    <div class="leg-dot" style="background:${col.css}"></div>
    <span>${item.model}</span>
    <span style="margin-left:auto;color:#444;font-size:10px">${item.weight} kg</span>
  `;
  legendEl.appendChild(row);
});

// ── Initial section draw (after layout) ───────────────────────────────────
requestAnimationFrame(() => drawSection(maxItemY + 1));
window.addEventListener('resize', () => drawSection(
  (slider.value / 1000) * (maxItemY + 0.01)
));

// ── Render loop ────────────────────────────────────────────────────────────
let raf;
function animate() {
  raf = requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
